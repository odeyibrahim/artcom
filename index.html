<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ulõ · Front Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f5ef;
      --card: #fcfaf7;
      --text: #1c1a18;
      --soft: #6b6158;
      --gold: #d4a373;
      --gold-dark: #b8935a;
      --border: #e5dfd8;
      --green: #7c9a7e;
      --red: #c88b8b;
      --orange: #d4a373;
      --shadow: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 6px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    
    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 24px;
      color: var(--text);
    }
    
    .badge {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--soft);
      background: var(--card);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    /* Buttons */
    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    
    .btn:hover {
      border-color: var(--gold);
    }
    
    .btn-primary {
      background: var(--gold);
      color: #fff;
      border-color: var(--gold);
    }
    
    .btn-primary:hover {
      background: var(--gold-dark);
    }
    
    .btn-sm {
      padding: 4px 10px;
      font-size: 10px;
    }
    
    .btn-icon {
      width: 32px;
      height: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    
    /* Summary Cards */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    
    .summary-card .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--soft);
      margin-bottom: 4px;
    }
    
    .summary-card .value {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
    }
    
    .summary-card .value.available { color: var(--green); }
    .summary-card .value.booked { color: var(--red); }
    .summary-card .value.pending { color: var(--orange); }
    
    /* Room Cards */
    .section-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--soft);
      margin-bottom: 12px;
    }
    
    .room-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .room-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    
    .room-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    
    .room-card-header h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
    }
    
    .room-stats {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--soft);
    }
    
    .room-stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    
    .dot.green { background: var(--green); }
    .dot.red { background: var(--red); }
    .dot.orange { background: var(--orange); }
    
    /* Date Pills */
    .date-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .date-pill {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s ease;
    }
    
    .date-pill:hover {
      border-color: var(--red);
      background: #fdf2f2;
    }
    
    .date-pill .remove {
      font-size: 14px;
      line-height: 1;
      opacity: 0.4;
      cursor: pointer;
    }
    
    .date-pill .remove:hover {
      opacity: 1;
      color: var(--red);
    }
    
    .no-dates {
      font-size: 11px;
      color: var(--soft);
      font-style: italic;
      opacity: 0.6;
    }
    
    /* Add Booking Form */
    .add-form {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    
    .add-form input,
    .add-form select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
    }
    
    .add-form input:focus,
    .add-form select:focus {
      outline: none;
      border-color: var(--gold);
    }
    
    .add-form input[type="date"] {
      min-width: 130px;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 12px;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1000;
      pointer-events: none;
    }
    
    .toast.show {
      opacity: 1;
    }
    
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }
    
    /* Deploy Status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--soft);
      padding: 10px 0;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }
    
    /* Login (simple PIN) */
    .login-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    
    .login-overlay.hidden {
      display: none;
    }
    
    .login-box {
      text-align: center;
      padding: 40px;
    }
    
    .login-box h1 {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 32px;
      margin-bottom: 4px;
    }
    
    .login-box p {
      color: var(--soft);
      font-size: 13px;
      margin-bottom: 20px;
    }
    
    .login-box input {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 18px;
      text-align: center;
      letter-spacing: 0.3em;
      width: 160px;
      background: var(--card);
    }
    
    .login-box input:focus {
      outline: none;
      border-color: var(--gold);
    }
  </style>
</head>
<body>

  <!-- Simple PIN Login -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h1>Ulõ</h1>
      <p>Front Desk</p>
      <input type="password" id="pinInput" placeholder="····" maxlength="4" autofocus />
    </div>
  </div>

  <div class="container" id="app" style="display:none;">
    
    <!-- Header -->
    <div class="header">
      <div class="logo-area">
        <span class="logo-text">Ulõ</span>
        <span class="badge">Front Desk</span>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="exportJSON()">📋 Copy JSON</button>
        <button class="btn btn-primary" onclick="deployNow()">📤 Deploy to Website</button>
      </div>
    </div>
    
    <!-- Summary -->
    <div class="summary-row" id="summaryRow"></div>
    
    <!-- Rooms -->
    <div class="section-title">Room Availability</div>
    <div class="room-grid" id="roomGrid"></div>
    
    <!-- Status -->
    <div class="status-bar">
      <span class="status-dot"></span>
      <span id="lastDeploy">Ready</span>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // ULO FRONT DESK - Self-contained admin panel
    // ============================================================
    
    var PIN = '2025'; // Change this to your own 4-digit PIN
    var ROOMS = {
      comfort:  { name: 'Comfort Zone',             total: 3, price: 85000 },
      super:    { name: 'Super Comfort',             total: 2, price: 110000 },
      studio:   { name: 'Studio Room',               total: 2, price: 150000 },
      oneroom:  { name: 'One Bedroom Apartment',     total: 1, price: 210000 },
      poolview: { name: 'One Bedroom Pool View',     total: 1, price: 230000 },
      twobed:   { name: 'Two Bedroom Apartment',     total: 2, price: 280000 }
    };
    
    // Load data from localStorage (survives refreshes)
    var data = JSON.parse(localStorage.getItem('uloData') || '{}');
    
    if (!data.bookings) {
      data = {
        bookings: {},  // { roomId: ['2026-07-25', '2026-07-26'] }
        blocked: {},   // { roomId: ['2026-12-25'] }
        lastDeploy: null
      };
      
      // Initialize empty arrays for each room
      Object.keys(ROOMS).forEach(function(id) {
        data.bookings[id] = [];
        data.blocked[id] = [];
      });
      
      saveData();
    }
    
    function saveData() {
      localStorage.setItem('uloData', JSON.stringify(data));
    }
    
    // ============================================================
    // LOGIN
    // ============================================================
    var loginOverlay = document.getElementById('loginOverlay');
    var pinInput = document.getElementById('pinInput');
    var app = document.getElementById('app');
    
    pinInput.addEventListener('input', function() {
      if (this.value.length === 4) {
        if (this.value === PIN) {
          loginOverlay.classList.add('hidden');
          app.style.display = 'block';
          renderAll();
          toast('Welcome back ✨', 'success');
        } else {
          this.value = '';
          this.classList.add('error');
          setTimeout(() => this.classList.remove('error'), 400);
        }
      }
    });
    
    // ============================================================
    // RENDER
    // ============================================================
    function renderAll() {
      renderSummary();
      renderRooms();
      updateStatus();
    }
    
    function renderSummary() {
      var totalRooms = 0;
      var bookedToday = 0;
      var pendingCount = 0;
      
      var today = new Date().toISOString().split('T')[0];
      
      Object.keys(ROOMS).forEach(function(id) {
        totalRooms += ROOMS[id].total;
        if (data.bookings[id].indexOf(today) !== -1) bookedToday++;
      });
      
      var available = totalRooms - bookedToday;
      
      document.getElementById('summaryRow').innerHTML = `
        <div class="summary-card">
          <div class="label">Available Today</div>
          <div class="value available">${available}</div>
        </div>
        <div class="summary-card">
          <div class="label">Booked Today</div>
          <div class="value booked">${bookedToday}</div>
        </div>
        <div class="summary-card">
          <div class="label">Total Rooms</div>
          <div class="value">${totalRooms}</div>
        </div>
        <div class="summary-card">
          <div class="label">Last Deploy</div>
          <div class="value" style="font-size:14px;font-family:'Inter',sans-serif;">${data.lastDeploy ? formatTime(data.lastDeploy) : 'Never'}</div>
        </div>
      `;
    }
    
    function renderRooms() {
      var html = '';
      
      Object.keys(ROOMS).forEach(function(id) {
        var room = ROOMS[id];
        var bookedDates = data.bookings[id] || [];
        var blockedDates = data.blocked[id] || [];
        var allBlocked = bookedDates.concat(blockedDates).sort();
        var available = room.total - countOverlap(bookedDates);
        
        html += `
          <div class="room-card">
            <div class="room-card-header">
              <h3>${room.name}</h3>
              <div class="room-stats">
                <span><span class="dot green"></span> ${available}/${room.total} available</span>
                <span><span class="dot red"></span> ${bookedDates.length} booked</span>
              </div>
            </div>
            
            <div class="date-pills">
              ${allBlocked.length === 0 ? '<span class="no-dates">All dates available</span>' : ''}
              ${allBlocked.map(function(date) {
                var isBlocked = blockedDates.indexOf(date) !== -1;
                return `
                  <span class="date-pill" style="${isBlocked ? 'border-color:var(--orange);' : ''}">
                    ${formatDate(date)}
                    ${isBlocked ? '(blocked)' : ''}
                    <span class="remove" onclick="removeDate('${id}', '${date}', '${isBlocked ? 'blocked' : 'booked'}')">×</span>
                  </span>
                `;
              }).join('')}
            </div>
            
            <div class="add-form">
              <input type="date" id="date-${id}" min="${new Date().toISOString().split('T')[0]}" />
              <select id="type-${id}">
                <option value="booked">Booked</option>
                <option value="blocked">Blocked</option>
              </select>
              <input type="text" id="guest-${id}" placeholder="Guest name (optional)" style="min-width:140px;" />
              <button class="btn btn-sm btn-primary" onclick="addDate('${id}')">+ Add</button>
            </div>
          </div>
        `;
      });
      
      document.getElementById('roomGrid').innerHTML = html;
    }
    
    function updateStatus() {
      var el = document.getElementById('lastDeploy');
      if (data.lastDeploy) {
        el.textContent = 'Last deployed: ' + formatTime(data.lastDeploy);
      } else {
        el.textContent = 'Not yet deployed';
      }
    }
    
    // ============================================================
    // ACTIONS
    // ============================================================
    function addDate(roomId) {
      var dateInput = document.getElementById('date-' + roomId);
      var typeSelect = document.getElementById('type-' + roomId);
      var guestInput = document.getElementById('guest-' + roomId);
      
      var date = dateInput.value;
      var type = typeSelect.value;
      var guest = guestInput.value.trim();
      
      if (!date) {
        toast('Please select a date', 'error');
        return;
      }
      
      var targetArray = type === 'blocked' ? data.blocked[roomId] : data.bookings[roomId];
      
      if (targetArray.indexOf(date) !== -1) {
        toast('Date already exists for this room', 'error');
        return;
      }
      
      targetArray.push(date);
      targetArray.sort();
      saveData();
      renderAll();
      
      dateInput.value = '';
      guestInput.value = '';
      
      var label = type === 'blocked' ? 'Blocked' : 'Booked';
      toast((guest ? guest + ' · ' : '') + ROOMS[roomId].name + ' · ' + formatDate(date) + ' · ' + label, 'success');
    }
    
    function removeDate(roomId, date, type) {
      var targetArray = type === 'blocked' ? data.blocked[roomId] : data.bookings[roomId];
      var index = targetArray.indexOf(date);
      if (index !== -1) {
        targetArray.splice(index, 1);
        saveData();
        renderAll();
        toast('Removed ' + formatDate(date), 'success');
      }
    }
    
    // ============================================================
    // DEPLOY
    // ============================================================
    function deployNow() {
      var json = buildJSON();
      
      // Copy to clipboard
      navigator.clipboard.writeText(json).then(function() {
        data.lastDeploy = new Date().toISOString();
        saveData();
        updateStatus();
        toast('✅ JSON copied! Upload to ulolagos.netlify.app/rooms.json', 'success');
      }).catch(function() {
        // Fallback: show in a dialog
        showJSONDialog(json);
      });
    }
    
    function buildJSON() {
      var rooms = {};
      
      Object.keys(ROOMS).forEach(function(id) {
        rooms[id] = {
          name: ROOMS[id].name,
          totalRooms: ROOMS[id].total,
          baseAvailability: ROOMS[id].total,
          basePrice: ROOMS[id].price,
          bookedDates: (data.bookings[id] || []).slice(),
          blockedDates: (data.blocked[id] || []).slice()
        };
      });
      
      return JSON.stringify({
        _generated: new Date().toISOString(),
        _hotel: 'Ulõ Aparthotel',
        rooms: rooms
      }, null, 2);
    }
    
    function exportJSON() {
      var json = buildJSON();
      navigator.clipboard.writeText(json).then(function() {
        toast('📋 JSON copied to clipboard', 'success');
      });
    }
    
    function showJSONDialog(json) {
      var w = window.open('', 'rooms.json', 'width=600,height=500');
      w.document.write('<pre style="font-family:monospace;font-size:11px;padding:20px;">' + json.replace(/</g, '&lt;') + '</pre>');
      w.document.title = 'rooms.json';
    }
    
    // ============================================================
    // HELPERS
    // ============================================================
    function countOverlap(dates) {
      // Count how many of these dates are in the future
      var today = new Date().toISOString().split('T')[0];
      return dates.filter(function(d) { return d >= today; }).length;
    }
    
    function formatDate(dateStr) {
      var d = new Date(dateStr + 'T00:00:00');
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate();
    }
    
    function formatTime(isoString) {
      var d = new Date(isoString);
      var now = new Date();
      var diff = Math.floor((now - d) / 60000);
      
      if (diff < 1) return 'Just now';
      if (diff < 60) return diff + 'm ago';
      if (diff < 1440) return Math.floor(diff / 60) + 'h ago';
      return d.toLocaleDateString();
    }
    
    function toast(msg, type) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + (type || '') + ' show';
      clearTimeout(el._timeout);
      el._timeout = setTimeout(function() {
        el.classList.remove('show');
      }, 2500);
    }
  </script>
</body>
</html>
