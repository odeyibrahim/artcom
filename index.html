<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Console Troubleshooter – Smarter Solutions Finder</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #273548;
            --border: #334155;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --accent: #38bdf8;
            --accent2: #818cf8;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --info: #60a5fa;
            --radius: 10px;
            --radius-sm: 6px;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            line-height: 1.6;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            padding: 4px 0;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #fff;
        }
        .logo-text span {
            font-size: 0.8rem;
            color: var(--text2);
            font-weight: 400;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            font-family: var(--font-sans);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--accent);
            color: #0f172a;
            border-color: var(--accent);
            font-weight: 700;
        }
        .btn-primary:hover {
            background: #7dd3fc;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.35);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border-color: var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--surface2);
            border-color: #64748b;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.78rem;
            border-radius: 4px;
        }
        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--text2);
            padding: 4px 8px;
        }
        .btn-ghost:hover {
            color: var(--text);
            background: var(--surface2);
        }

        /* Main Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 16px;
            min-height: 600px;
        }
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }
        }

        /* Panels */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
            background: var(--surface2);
        }
        .panel-header h3 {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            color: #cbd5e1;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        .panel-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Code Editor */
        .code-editor-wrap {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .code-textarea {
            flex: 1;
            background: #0c1222;
            color: #e2e8f0;
            border: none;
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.65;
            resize: none;
            outline: none;
            tab-size: 2;
            min-height: 280px;
            width: 100%;
        }
        .code-textarea::placeholder {
            color: #475569;
        }
        .lang-selector {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: #0a0f1a;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .lang-pill {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            transition: all 0.18s;
            font-weight: 500;
            font-family: var(--font-sans);
        }
        .lang-pill.active {
            background: var(--accent);
            color: #0f172a;
            border-color: var(--accent);
            font-weight: 700;
        }
        .lang-pill:hover:not(.active) {
            border-color: #64748b;
            color: #cbd5e1;
        }

        /* Results Panel */
        .results-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 280px;
            max-height: 500px;
        }
        .results-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .results-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .result-card {
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            border-left: 4px solid var(--info);
            background: var(--surface2);
            animation: fadeSlide 0.3s ease;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-card.severity-high {
            border-left-color: var(--danger);
            background: #2a1a1f;
        }
        .result-card.severity-medium {
            border-left-color: var(--warning);
            background: #2a2418;
        }
        .result-card.severity-low {
            border-left-color: var(--info);
        }
        .result-card.severity-success {
            border-left-color: var(--success);
            background: #1a2a1f;
        }
        .result-card .card-tag {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 2px 8px;
            border-radius: 3px;
            margin-bottom: 6px;
        }
        .tag-native {
            background: #1e3a5f;
            color: #60a5fa;
        }
        .tag-library {
            background: #3b2f1e;
            color: #fbbf24;
        }
        .tag-pattern {
            background: #1e2f3a;
            color: #38bdf8;
        }
        .tag-security {
            background: #3a1e1e;
            color: #f87171;
        }
        .tag-perf {
            background: #2a1f3a;
            color: #c084fc;
        }
        .result-card h4 {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 4px 0;
            color: #fff;
        }
        .result-card p {
            font-size: 0.8rem;
            color: #cbd5e1;
            margin: 2px 0;
            line-height: 1.5;
        }
        .result-card .suggestion {
            margin-top: 8px;
            background: #0c1222;
            border-radius: 4px;
            padding: 10px 12px;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: #a5f3fc;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .result-card .link-ref {
            font-size: 0.72rem;
            color: var(--accent);
            text-decoration: underline;
            cursor: pointer;
            margin-top: 4px;
            display: inline-block;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
            gap: 10px;
        }
        .empty-state .icon {
            font-size: 48px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 0.85rem;
            max-width: 300px;
        }
        .stats-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .stat-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
        }
        .stat-badge.warn {
            border-color: var(--warning);
            color: var(--warning);
        }
        .stat-badge.good {
            border-color: var(--success);
            color: var(--success);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon">🔍</div>
                <div class="logo-text">
                    <h1>WheelGuard</h1>
                    <span>Stop Reinventing · Code Smarter</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline btn-sm" onclick="loadSample('js-debounce')" title="Load JS debounce example">📦 Debounce</button>
                <button class="btn btn-outline btn-sm" onclick="loadSample('js-date')" title="Load date formatting example">📅 Date Format</button>
                <button class="btn btn-outline btn-sm" onclick="loadSample('js-deepclone')" title="Load deep clone example">🧬 Deep Clone</button>
                <button class="btn btn-outline btn-sm" onclick="loadSample('py-loop')" title="Load Python loop example">🐍 Python Loop</button>
                <button class="btn btn-outline btn-sm" onclick="loadSample('css-center')" title="Load CSS centering example">🎨 CSS Center</button>
                <button class="btn btn-ghost btn-sm" onclick="clearAll()">🗑 Clear</button>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Code Input Panel -->
            <div class="panel" style="grid-row: span 2;">
                <div class="panel-header">
                    <h3>📝 Paste Your Code</h3>
                    <span style="font-size:0.7rem;color:var(--text2);" id="charCount">0 chars</span>
                </div>
                <div class="panel-body">
                    <div class="code-editor-wrap">
                        <textarea
                        class="code-textarea"
                        id="codeInput"
                        placeholder="Paste your JavaScript, Python, CSS, or HTML code here...&#10;&#10;Example:&#10;function debounce(fn, delay) {&#10;  let timer;&#10;  return function(...args) {&#10;    clearTimeout(timer);&#10;    timer = setTimeout(() => fn(...args), delay);&#10;  }&#10;}"
                    ></textarea>
                    <div class="lang-selector" id="langSelector">
                        <button class="lang-pill active" data-lang="auto">🔄 Auto-Detect</button>
                        <button class="lang-pill" data-lang="javascript">JS/TS</button>
                        <button class="lang-pill" data-lang="python">Python</button>
                        <button class="lang-pill" data-lang="css">CSS</button>
                        <button class="lang-pill" data-lang="html">HTML</button>
                        <button class="lang-pill" data-lang="sql">SQL</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Panel -->
        <div class="panel">
            <div class="panel-header">
                <h3>🧠 Analysis Results</h3>
                <div class="stats-row" id="statsRow">
                    <span class="stat-badge" id="statTotal">0 findings</span>
                </div>
            </div>
            <div class="panel-body">
                <div class="results-scroll" id="resultsContainer">
                    <div class="empty-state">
                        <span class="icon">🔎</span>
                        <p><strong>Paste code and click Analyze</strong></p>
                        <p style="font-size:0.78rem;">I'll check for reinvented wheels, missed native APIs, and smarter library alternatives.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Analyze Button Row -->
    <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;padding:8px 0;">
        <button class="btn btn-primary" onclick="analyzeCode()" style="font-size:1rem;padding:12px 32px;">
            ⚡ Analyze Code
        </button>
        <button class="btn btn-outline" onclick="analyzeCode()" style="font-size:0.9rem;">
            🔄 Re-run Analysis
        </button>
    </div>
</div>

<script>
    (function() {
        // ──────────────────────────────────────
        // Language selector UI
        // ──────────────────────────────────────
        const langPills = document.querySelectorAll('#langSelector .lang-pill');
        let selectedLang = 'auto';

        langPills.forEach(pill => {
            pill.addEventListener('click', () => {
                langPills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                selectedLang = pill.dataset.lang;
            });
        });

        // Character count
        const codeInput = document.getElementById('codeInput');
        const charCountEl = document.getElementById('charCount');
        codeInput.addEventListener('input', () => {
            const len = codeInput.value.length;
            charCountEl.textContent = len + ' char' + (len !== 1 ? 's' : '');
        });

        // ──────────────────────────────────────
        // Auto-detect language
        // ──────────────────────────────────────
        function detectLanguage(code) {
            const trimmed = code.trim();
            if (!trimmed) return 'unknown';

            const jsIndicators = [
                'function ', 'const ', 'let ', 'var ', '=>', 'async ', 'await ',
                'console.', 'document.', 'window.', 'export ', 'import ',
                'require(', 'module.exports', 'addEventListener',
                'useState', 'useEffect', 'className=', 'jsx', '<>',
                'Promise', '.then(', '.catch(', 'try {',
            ];
            const pyIndicators = [
                'def ', 'import ', 'from ', 'print(', 'class ',
                ':  #', 'self.', '__init__', 'elif ', 'None',
                'True', 'False', 'lambda ', 'with ', ' as ',
                'if __name__', 'f\'', 'f"', 'range(', 'len(',
            ];
            const cssIndicators = [
                '{', '}', ':', ';', '@media', '@keyframes',
                'px', 'em', 'rem', 'vw', 'vh', '%', 'rgb',
                'display:', 'flex', 'grid', 'margin:', 'padding:',
                'color:', 'background:', 'font-size:',
            ];
            const htmlIndicators = [
                '<!DOCTYPE', '<html', '<div', '<span', '<p',
                '<a ', '<img', '<ul', '<li', '<table', '<form',
                '<input', '<button', '<script', '<style',
            ];
            const sqlIndicators = [
                'SELECT ', 'FROM ', 'WHERE ', 'INSERT ', 'UPDATE ',
                'DELETE ', 'CREATE TABLE', 'ALTER TABLE', 'JOIN ',
                'GROUP BY', 'ORDER BY', 'HAVING ', 'LIMIT ',
            ];

            let scores = { javascript: 0, python: 0, css: 0, html: 0, sql: 0 };

            for (const ind of jsIndicators) {
                if (trimmed.includes(ind)) scores.javascript += 2;
            }
            for (const ind of pyIndicators) {
                if (trimmed.includes(ind)) scores.python += 2;
            }
            for (const ind of cssIndicators) {
                if (trimmed.includes(ind)) scores.css += 1.5;
            }
            for (const ind of htmlIndicators) {
                if (trimmed.includes(ind)) scores.html += 3;
            }
            for (const ind of sqlIndicators) {
                if (trimmed.includes(ind)) scores.sql += 3;
            }

            // Heuristic: if lots of braces+semicolons but no def/import, likely JS
            const braceCount = (trimmed.match(/\{/g) || []).length;
            const semicolonCount = (trimmed.match(/;/g) || []).length;
            if (braceCount > 3 && semicolonCount > 2 && scores.python === 0) {
                scores.javascript += 4;
            }
            // If has colons and indentation patterns like Python
            if (trimmed.match(/^[ \t]+/gm) && scores.python > 0 && semicolonCount === 0) {
                scores.python += 2;
            }
            // CSS: lots of colons with property-like patterns
            const colonPropPattern = (trimmed.match(/[a-z-]+\s*:\s*[^;]+;/g) || []).length;
            if (colonPropPattern > 3 && scores.html < 3) {
                scores.css += 5;
            }

            const best = Object.entries(scores).sort((a, b) => b[1] - a[1])[0];
            if (best[1] < 2) return 'unknown';
            return best[0];
        }

        // ──────────────────────────────────────
        // Knowledge Base: Patterns to detect
        // ──────────────────────────────────────
        const knowledgeBase = [
            // ── JavaScript Patterns ──
            {
                id: 'js-debounce',
                langs: ['javascript'],
                pattern: /function\s+debounce\s*\(/i,
                severity: 'medium',
                tag: 'library',
                tagClass: 'tag-library',
                title: 'Custom Debounce Implementation Detected',
                desc: 'You wrote a debounce function from scratch. While this works, well-tested implementations exist.',
                suggestion: '// Consider using lodash.debounce (tree-shakeable):\nimport debounce from \'lodash.debounce\';\n\n// Or a tiny dedicated package:\nimport debounce from \'debounce\';\n\n// Or keep it if bundle size is critical — your implementation may be fine for simple cases.',
                links: ['https://www.npmjs.com/package/debounce', 'https://lodash.com/docs#debounce'],
            },
            {
                id: 'js-throttle',
                langs: ['javascript'],
                pattern: /function\s+throttle\s*\(/i,
                severity: 'medium',
                tag: 'library',
                tagClass: 'tag-library',
                title: 'Custom Throttle Implementation Detected',
                desc: 'Throttle is commonly needed but tricky to get right with edge cases.',
                suggestion: '// Use lodash.throttle or a dedicated package:\nimport throttle from \'lodash.throttle\';\n\n// Or use RxJS for reactive throttling:\nimport { throttleTime } from \'rxjs/operators\';',
                links: ['https://lodash.com/docs#throttle'],
            },
            {
                id: 'js-deepclone',
                langs: ['javascript'],
                pattern: /(function\s+deepClone|function\s+deepCopy|JSON\.parse\(JSON\.stringify|structuredClone\s*\(|<structuredClone)/i,
                severity: 'low',
                tag: 'native',
                tagClass: 'tag-native',
                title: 'Deep Cloning — Use Native structuredClone()',
                desc: 'JSON.parse(JSON.stringify(obj)) loses Dates, Maps, Sets, RegExp, functions, and circular refs. Custom deepClone is error-prone.',
                suggestion: '// Modern native solution (Node 17+, all modern browsers):\nconst copy = structuredClone(original);\n\n// For older environments, use a well-tested library:\nimport cloneDeep from \'lodash.clonedeep\';',
                links: ['https://developer.mozilla.org/en-US/docs/Web/API/structuredClone'],
            },
            {
                id: 'js-date-format',
                langs: ['javascript'],
                pattern: /(new\s+Date\(.*\)\.(getFullYear|getMonth|getDate|getHours|getMinutes|getSeconds|toLocaleDateString|toISOString)|moment\(|dayjs\(|date-fns)/i,
                severity: 'low',
                tag: 'native',
                tagClass: 'tag-native',
                title: 'Date Formatting — Consider Intl.DateTimeFormat or date-fns',
                desc: 'Manual date formatting with getFullYear/getMonth string concatenation is verbose and locale-unaware.',
                suggestion: '// Native Intl API (no library needed):\nconst formatted = new Intl.DateTimeFormat(\'en-US\', {\n  year: \'numeric\', month: \'long\', day: \'numeric\'\n}).format(new Date());\n\n// For complex needs, use date-fns (tree-shakeable):\nimport { format } from \'date-fns\';\nformat(new Date(), \'yyyy-MM-dd\');',
                links: ['https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Intl/DateTimeFormat',
                    'https://date-fns.org/'
                ],
            },
            {
                id: 'js-uuid',
                langs: ['javascript'],
                pattern: /(['"`][0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}['"`]|Math\.random\(\)\.toString\(16\)|function\s+generateUUID|function\s+uuid)/i,
                severity: 'high',
                tag: 'native',
                tagClass: 'tag-native',
                title: 'UUID Generation — Use crypto.randomUUID()',
                desc: 'Math.random()-based UUIDs are not cryptographically secure. Manual UUID generation is unnecessary.',
                suggestion: '// Native, secure, one-liner (all modern browsers + Node 19+):\nconst id = crypto.randomUUID();\n\n// For older Node.js:\nimport { randomUUID } from \'crypto\';\nconst id = randomUUID();',
                links: ['https://developer.mozilla.org/en-US/docs/Web/API/Crypto/randomUUID'],
            },
            {
                id: 'js-query-selector',
                langs: ['javascript'],
                pattern: /(document\.getElementById\(|document\.getElementsByClassName\(|document\.getElementsByTagName\(|jQuery\(|\$\(['"]#)/i,
                severity: 'low',
                tag: 'native',
                tagClass: 'tag-native',
                title: 'DOM Selection — querySelector/querySelectorAll is Standard',
                desc: 'Using legacy DOM methods or jQuery for simple selections adds unnecessary complexity.',
                suggestion: '// Modern vanilla JS:\nconst el = document.querySelector(\'.my-class\');\nconst els = document.querySelectorAll(\'[data-attr="value"]\');\n\n// No jQuery needed for modern browsers.',
                links: ['https://developer.mozilla.org/en-US/docs/Web/API/Document/querySelector'],
            },
            {
                id: 'js-fetch-wrapper',
                langs: ['javascript'],
                pattern: /(new\s+XMLHttpRequest\(|xhr\.open|axios\.create|function\s+fetchWithTimeout|function\s+httpRequest)/i,
                severity: 'medium',
                tag: 'library',
                tagClass: 'tag-library',
                title: 'HTTP Requests — Use fetch() or a Proven Client',
                desc: 'XMLHttpRequest is legacy. Custom fetch wrappers often miss error handling, retries, and interceptors.',
                suggestion: '// Native fetch (all modern browsers):\nconst res = await fetch(\'/api/data\');\nif (!res.ok) throw new Error(`HTTP ${res.status}`);\nconst data = await res.json();\n\n// For advanced needs, use ky (tiny) or axios:\nimport ky from \'ky\';\nconst data = await ky.get(\'/api/data\').json();',
                links: ['https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API', 'https://github.com/sindresorhus/ky'],
            },
            {
                id: 'js-array-unique',
                langs: ['javascript'],
                pattern: /(\.filter\(.*indexOf|\.reduce\(.*includes|function\s+unique|function\s+uniq|new\s+Set\(.*\))/i,
                severity: 'low',
                tag: 'native',
                tagClass: 'tag-native',
                title: 'Array Deduplication — Use Set',
                desc: 'Filter+indexOf for uniqueness is O(n²). Use Set for O(n) deduplication.',

        // ──────────────────────────────────────
        // Main Analysis Function
        // ──────────────────────────────────────
        function analyzeCode() {
            const code = codeInput.value;
            const resultsContainer = document.getElementById('resultsContainer');
            const statsRow = document.getElementById('statsRow');
            const statTotal = document.getElementById('statTotal');

            if (!code.trim()) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📭</span>
                        <p><strong>No code to analyze</strong></p>
                        <p style="font-size:0.78rem;">Paste some code above and try again.</p>
                    </div>`;
                statsRow.innerHTML = '<span class="stat-badge">0 findings</span>';
                return;
            }

            // Determine language
            const effectiveLang = selectedLang === 'auto' ? detectLanguage(code) : selectedLang;
            const langDisplay = effectiveLang.charAt(0).toUpperCase() + effectiveLang.slice(1);

            // Run all checks
            const findings = [];
            for (const check of knowledgeBase) {
                if (check.langs.includes(effectiveLang) || check.langs.includes('javascript') && effectiveLang ===
                    'javascript') {
                    try {
                        if (check.pattern.test(code)) {
                            findings.push(check);
                        }
                    } catch (e) {
                        // Regex error, skip
                    }
                }
                // Also run generic checks on any language
                if (check.langs.includes('javascript') && effectiveLang === 'unknown') {
                    try {
                        if (check.pattern.test(code)) {
                            findings.push(check);
                        }
                    } catch (e) {}
                }
            }

            // Deduplicate by ID
            const uniqueFindings = [];
            const seen = new Set();
            for (const f of findings) {
                if (!seen.has(f.id)) {
                    seen.add(f.id);
                    uniqueFindings.push(f);
                }
            }

            // Render results
            if (uniqueFindings.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">✅</span>
                        <p><strong>No reinvented wheels detected!</strong></p>
                        <p style="font-size:0.78rem;">Detected language: <strong>${langDisplay}</strong></p>
                        <p style="font-size:0.78rem;">Your code looks good — no obvious anti-patterns found. Still, always check npm/PyPI for existing solutions before building from scratch.</p>
                    </div>`;
                statsRow.innerHTML = `
                    <span class="stat-badge good">✓ Clean code</span>
                    <span class="stat-badge">Lang: ${langDisplay}</span>`;
            } else {
                const highCount = uniqueFindings.filter(f => f.severity === 'high').length;
                const mediumCount = uniqueFindings.filter(f => f.severity === 'medium').length;
                const lowCount = uniqueFindings.filter(f => f.severity === 'low').length;

                let html = '';
                for (const f of uniqueFindings) {
                    const linksHtml = f.links ?
                        f.links.map(l => `<a class="link-ref" href="${l}" target="_blank" rel="noopener">📖 ${l.replace('https://', '').split('/')[0]} →</a>`)
                        .join(' &nbsp; ') :
                        '';
                    html += `
                        <div class="result-card severity-${f.severity}">
                            <span class="card-tag ${f.tagClass}">${f.tag}</span>
                            <h4>${f.title}</h4>
                            <p>${f.desc}</p>
                            <div class="suggestion">${f.suggestion.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                            ${linksHtml ? `<div style="margin-top:6px;">${linksHtml}</div>` : ''}
                        </div>`;
                }
                resultsContainer.innerHTML = html;

                let badges = `<span class="stat-badge">${uniqueFindings.length} finding${uniqueFindings.length !== 1 ? 's' : ''}</span>`;
                if (highCount > 0) badges +=
                    `<span class="stat-badge warn">🔴 ${highCount} critical</span>`;
                if (mediumCount > 0) badges +=
                    `<span class="stat-badge warn">🟡 ${mediumCount} medium</span>`;
                if (lowCount > 0) badges +=
                    `<span class="stat-badge">🔵 ${lowCount} info</span>`;
                badges += `<span class="stat-badge">Lang: ${langDisplay}</span>`;
                statsRow.innerHTML = badges;
            }

            // Scroll results to top
            resultsContainer.scrollTop = 0;
        }

        // ──────────────────────────────────────
        // Sample Data Loaders
        // ──────────────────────────────────────
        const samples = {
            'js-debounce': {
                code: `// Custom debounce implementation\nfunction debounce(fn, delay) {\n  let timer;\n  return function(...args) {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn.apply(this, args), delay);\n  };\n}\n\n// Usage\nconst handleSearch = debounce((query) => {\n  console.log('Searching for:', query);\n}, 300);`,
                lang: 'javascript',
            },
            'js-date': {
                code: `// Manual date formatting\nfunction formatDate(date) {\n  const d = new Date(date);\n  const year = d.getFullYear();\n  const month = String(d.getMonth() + 1).padStart(2, '0');\n  const day = String(d.getDate()).padStart(2, '0');\n  const hours = String(d.getHours()).padStart(2, '0');\n  const minutes = String(d.getMinutes()).padStart(2, '0');\n  return year + '-' + month + '-' + day + ' ' + hours + ':' + minutes;\n}\n\nconsole.log(formatDate(new Date()));`,
                lang: 'javascript',
            },
            'js-deepclone': {
                code: `// Deep clone using JSON hack\nfunction deepClone(obj) {\n  return JSON.parse(JSON.stringify(obj));\n}\n\nconst original = {\n  name: 'Alice',\n  created: new Date(),\n  tags: ['admin', 'user']\n};\n\nconst copy = deepClone(original);\n// ⚠️ Date becomes string, undefined values lost, circular refs break`,
                lang: 'javascript',
            },
            'py-loop': {
                code: `# Python: building lists manually\nitems = [1, 2, 3, 4, 5]\nresult = []\nfor i in range(len(items)):\n    result.append(items[i] * 2)\n\n# Counting manually\ncounts = {}\nfor word in ['a', 'b', 'a', 'c', 'b', 'a']:\n    if word in counts:\n        counts[word] += 1\n    else:\n        counts[word] = 1\n\nprint(result)\nprint(counts)`,
                lang: 'python',
            },
            'css-center': {
                code: `/* Old-school centering */\n.modal {\n  position: absolute;\n  top: 50%;\n  left: 50%;\n  transform: translate(-50%, -50%);\n  width: 400px;\n  height: 300px;\n}\n\n.container {\n  text-align: center;\n}\n.container .child {\n  display: inline-block;\n  vertical-align: middle;\n}`,
                lang: 'css',
            },
        };

        window.loadSample = function(sampleKey) {
            const sample = samples[sampleKey];
            if (!sample) return;
            codeInput.value = sample.code;
            charCountEl.textContent = sample.code.length + ' chars';
            // Set language pill
            langPills.forEach(p => p.classList.remove('active'));
            const targetPill = document.querySelector(`#langSelector .lang-pill[data-lang="${sample.lang}"]`);
            if (targetPill) {
                targetPill.classList.add('active');
                selectedLang = sample.lang;
            } else {
                document.querySelector('#langSelector .lang-pill[data-lang="auto"]').classList.add('active');
                selectedLang = 'auto';
            }
            // Auto-analyze
            analyzeCode();
            // Scroll to results
            document.getElementById('resultsContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        window.clearAll = function() {
            codeInput.value = '';
            charCountEl.textContent = '0 chars';
            document.getElementById('resultsContainer').innerHTML = `
                <div class="empty-state">
                    <span class="icon">🔎</span>
                    <p><strong>Paste code and click Analyze</strong></p>
                    <p style="font-size:0.78rem;">I'll check for reinvented wheels, missed native APIs, and smarter library alternatives.</p>
                </div>`;
            document.getElementById('statsRow').innerHTML = '<span class="stat-badge">0 findings</span>';
            langPills.forEach(p => p.classList.remove('active'));
            document.querySelector('#langSelector .lang-pill[data-lang="auto"]').classList.add('active');
            selectedLang = 'auto';
        };

        // Expose analyzeCode globally
        window.analyzeCode = analyzeCode;

        // ──────────────────────────────────────
        // Keyboard shortcut: Ctrl+Enter to analyze
        // ──────────────────────────────────────
        codeInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                analyzeCode();
            }
        });

        // Initial placeholder hint
        console.log('%c🔍 WheelGuard Ready %c| Paste code & press Ctrl+Enter to analyze',
            'font-weight:bold;color:#38bdf8;', 'color:#94a3b8;');
        console.log('%cBuilt-in checks: debounce, deep clone, date format, UUID, DOM selection, ' +
            'fetch, array utils, HTML parsing, Python loops, CSS centering, SQL injection & more.',
            'color:#94a3b8;font-size:0.85em;');
    })();
</script>
